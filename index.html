<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>けいすけの47都道府県たび</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #FF6B9D;
      --pink-light: #FFB8D0;
      --orange: #FF9A56;
      --yellow: #FFD93D;
      --green: #6BCB77;
      --blue: #4D96FF;
      --purple: #9B72CF;
      --bg: #FFF8F0;
      --card: #FFFFFF;
      --text: #4A3728;
      --text-light: #8B7355;
      --visited: #6BCB77;
      --visited-light: #D4F5D4;
      --unvisited: #E8E0D8;
      --unvisited-hover: #DDD4CA;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: 80px;
    }

    /* ===== Header ===== */
    .header {
      background: linear-gradient(135deg, var(--pink), var(--orange));
      color: white;
      padding: 20px 16px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      right: 0;
      height: 24px;
      background: var(--bg);
      border-radius: 50% 50% 0 0;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .header h1 .emoji {
      font-size: 24px;
    }

    .header-sub {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 4px;
    }

    /* ===== Progress Section ===== */
    .progress-section {
      padding: 0 16px;
      margin-top: -8px;
      position: relative;
      z-index: 1;
    }

    .progress-card {
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      text-align: center;
    }

    .progress-number {
      font-size: 48px;
      font-weight: 900;
      color: var(--pink);
      line-height: 1;
    }

    .progress-number span {
      font-size: 20px;
      color: var(--text-light);
      font-weight: 700;
    }

    .progress-label {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 4px;
    }

    .progress-bar-wrap {
      margin-top: 12px;
      background: #F0E8E0;
      border-radius: 10px;
      height: 14px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--yellow), var(--green));
      transition: width 0.6s ease;
      min-width: 4px;
    }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-light);
    }

    .progress-stats .age {
      background: var(--pink-light);
      color: var(--pink);
      padding: 2px 10px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 11px;
    }

    /* ===== Tab Navigation ===== */
    .tab-nav {
      display: flex;
      gap: 0;
      padding: 16px 16px 0;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: var(--unvisited);
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn:first-child { border-radius: 12px 0 0 12px; }
    .tab-btn:last-child { border-radius: 0 12px 12px 0; }

    .tab-btn.active {
      background: var(--pink);
      color: white;
    }

    /* ===== Map Grid ===== */
    .map-container {
      padding: 16px;
    }

    .map-grid {
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      grid-template-rows: repeat(15, 1fr);
      gap: 2px;
      max-width: 400px;
      margin: 0 auto;
      aspect-ratio: 11 / 15;
    }

    .pref-cell {
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--unvisited);
      color: var(--text-light);
      line-height: 1.1;
      text-align: center;
      padding: 1px;
      position: relative;
    }

    .pref-cell.visited {
      background: var(--visited);
      color: white;
    }

    .pref-cell.planned {
      background: var(--blue);
      color: white;
    }

    .pref-cell:active {
      transform: scale(0.92);
    }

    @media (min-width: 400px) {
      .pref-cell { font-size: 10px; }
    }

    /* ===== Region List ===== */
    .region-list {
      padding: 0 16px 16px;
    }

    .region-group {
      margin-bottom: 16px;
    }

    .region-title {
      font-size: 14px;
      font-weight: 900;
      padding: 8px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .region-title .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .region-prefs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
    }

    .pref-chip {
      background: var(--card);
      border: 2px solid var(--unvisited);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pref-chip.visited {
      background: var(--visited-light);
      border-color: var(--visited);
      color: var(--visited);
    }

    .pref-chip.planned {
      background: #E0ECFF;
      border-color: var(--blue);
      color: var(--blue);
    }

    .pref-chip:active {
      transform: scale(0.95);
    }

    .pref-chip .check {
      font-size: 14px;
      display: block;
      margin-bottom: 2px;
    }

    /* ===== Modal ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: var(--card);
      border-radius: 24px 24px 16px 16px;
      width: 100%;
      max-width: 440px;
      max-height: 85dvh;
      overflow-y: auto;
      padding: 0;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: #DDD;
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .modal-header {
      padding: 16px 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 22px;
      font-weight: 900;
    }

    .modal-header .region-badge {
      font-size: 11px;
      background: var(--pink-light);
      color: var(--pink);
      padding: 3px 10px;
      border-radius: 8px;
      font-weight: 700;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #F0E8E0;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-body {
      padding: 16px 20px 24px;
    }

    .modal-status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
    }

    .modal-status.unvisited-status {
      background: #FFF3E0;
      color: var(--orange);
    }

    .modal-status.visited-status {
      background: var(--visited-light);
      color: var(--visited);
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #E8E0D8;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--pink);
    }

    .form-group textarea {
      height: 80px;
      resize: vertical;
    }

    .photo-upload {
      border: 2px dashed #E8E0D8;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      color: var(--text-light);
      font-size: 13px;
      transition: all 0.2s;
    }

    .photo-upload:hover {
      border-color: var(--pink);
      background: #FFF5F8;
    }

    .photo-upload .icon {
      font-size: 28px;
      display: block;
      margin-bottom: 4px;
    }

    .photo-preview {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .photo-thumb {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      position: relative;
    }

    .photo-thumb-wrap {
      position: relative;
      display: inline-block;
    }

    .photo-thumb-wrap .remove-photo {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--pink);
      color: white;
      border: none;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--orange));
      color: white;
    }

    .btn-visited {
      background: linear-gradient(135deg, var(--green), #4CAF50);
      color: white;
    }

    .btn-secondary {
      background: #F0E8E0;
      color: var(--text-light);
    }

    .btn-danger {
      background: #FFE0E0;
      color: #E74C3C;
    }

    /* ===== Bottom Nav ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      display: flex;
      justify-content: center;
      gap: 0;
      padding: 8px 16px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      box-shadow: 0 -2px 16px rgba(0,0,0,0.06);
      z-index: 50;
    }

    .nav-btn {
      flex: 1;
      max-width: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px;
      border: none;
      background: none;
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-light);
      cursor: pointer;
    }

    .nav-btn .nav-icon {
      font-size: 22px;
      line-height: 1;
    }

    .nav-btn.active {
      color: var(--pink);
    }

    /* ===== View Toggle ===== */
    .view { display: none; }
    .view.active { display: block; }

    /* ===== Confetti ===== */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall 1.5s ease forwards;
    }

    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ===== Empty State ===== */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    .empty-state .emoji {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
    }


    /* ===== Claude Info Section ===== */
    .claude-section {
      margin-top: 16px;
      border-top: 2px dashed #E8E0D8;
      padding-top: 14px;
    }

    .claude-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .claude-section-title {
      font-size: 14px;
      font-weight: 900;
      color: var(--purple);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .claude-toggle {
      font-size: 12px;
      color: var(--text-light);
      font-weight: 700;
    }

    .claude-info-body {
      display: none;
    }

    .claude-info-body.open {
      display: block;
    }

    .claude-info-card {
      background: #F8F0FF;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .claude-info-card h4 {
      font-size: 12px;
      font-weight: 900;
      color: var(--purple);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .claude-info-card p,
    .claude-info-card ul {
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
    }

    .claude-info-card ul {
      padding-left: 16px;
    }

    .claude-info-card li {
      margin-bottom: 2px;
    }

    .claude-import-area {
      margin-top: 10px;
    }

    .claude-import-area textarea {
      width: 100%;
      height: 100px;
      padding: 10px 12px;
      border: 2px solid #D8C8F0;
      border-radius: 10px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      background: #FDFAFF;
      resize: vertical;
    }

    .claude-import-area textarea:focus {
      outline: none;
      border-color: var(--purple);
    }

    .claude-import-area textarea::placeholder {
      color: #C0A8D8;
    }

    .claude-btn-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .btn-claude {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-claude:active { transform: scale(0.95); }

    .btn-claude-primary {
      background: linear-gradient(135deg, #9B72CF, #6B4CE6);
      color: white;
    }

    .btn-claude-secondary {
      background: #F0E8FF;
      color: var(--purple);
    }

    .btn-claude-copy {
      background: #E8F5E9;
      color: #388E3C;
    }

    .import-success {
      background: var(--visited-light);
      color: var(--visited);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      margin-top: 8px;
      display: none;
    }

    .import-success.show {
      display: block;
      animation: slideUp 0.3s ease;
    }

    /* ===== Plan View ===== */
    .plan-header {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: white;
      padding: 20px 16px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .plan-header::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      right: 0;
      height: 24px;
      background: var(--bg);
      border-radius: 50% 50% 0 0;
    }

    .plan-header h1 {
      font-size: 20px;
      font-weight: 900;
    }

    .roadmap-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 24px;
      background: rgba(255,255,255,0.25);
      color: white;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 30px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
    }

    .roadmap-btn:active {
      background: rgba(255,255,255,0.4);
      transform: scale(0.96);
    }

    /* ===== Plan-Shiori Link ===== */
    .plan-shiori-btn {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      border: 2px dashed var(--pink-light);
      border-radius: 10px;
      background: none;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      color: var(--pink);
      cursor: pointer;
    }

    .plan-shiori-btn.linked {
      border-style: solid;
      background: linear-gradient(135deg, #FFF0F5, #FFE8EF);
      border-color: var(--pink);
    }

    .plan-shiori-link-info {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 4px;
      text-align: center;
    }

    /* ===== Shiori View ===== */
    .shiori-header {
      background: linear-gradient(135deg, #FF6B6B, var(--pink));
      color: white;
      padding: 20px 16px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .shiori-header::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      right: 0;
      height: 24px;
      background: var(--bg);
      border-radius: 50% 50% 0 0;
    }

    .shiori-header h1 {
      font-size: 20px;
      font-weight: 900;
    }

    .shiori-add-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 24px;
      background: rgba(255,255,255,0.25);
      color: white;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 30px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      backdrop-filter: blur(4px);
    }

    .shiori-list {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .shiori-card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.15s;
    }

    .shiori-card:active {
      transform: scale(0.98);
    }

    .shiori-card-title {
      font-size: 16px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 4px;
    }

    .shiori-card-date {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 8px;
    }

    .shiori-card-days {
      font-size: 11px;
      color: var(--pink);
      font-weight: 700;
    }

    .shiori-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
      font-size: 14px;
    }

    /* Shiori Detail */
    .shiori-detail {
      display: none;
    }

    .shiori-detail.active {
      display: block;
    }

    .shiori-detail-header {
      background: linear-gradient(135deg, #FF6B6B, var(--pink));
      color: white;
      padding: 16px;
      position: relative;
    }

    .shiori-back-btn {
      background: none;
      border: none;
      color: white;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      padding: 4px 0;
      margin-bottom: 8px;
    }

    .shiori-detail-title {
      font-size: 18px;
      font-weight: 900;
    }

    .shiori-detail-date {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 4px;
    }

    .shiori-detail-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .shiori-detail-actions button {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }

    .shiori-day {
      margin: 12px 16px;
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .shiori-day-header {
      background: linear-gradient(135deg, var(--pink-light), #FFD0E0);
      padding: 12px 16px;
      font-weight: 900;
      font-size: 15px;
      color: var(--text);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .shiori-day-date-input {
      font-family: inherit;
      font-size: 12px;
      padding: 4px 8px;
      border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: 8px;
      background: white;
      color: var(--text);
    }

    .shiori-item {
      padding: 12px 16px;
      border-bottom: 1px solid #F5F0EB;
    }

    .shiori-item:last-child {
      border-bottom: none;
    }

    .shiori-item-row {
      display: flex;
      align-items: center;

// ===== Age Calculation =====
function getAge() {
  const now = new Date();
  let age = now.getFullYear() - BIRTHDAY.getFullYear();
  const m = now.getMonth() - BIRTHDAY.getMonth();
  if (m < 0 || (m === 0 && now.getDate() < BIRTHDAY.getDate())) age--;
  return Math.max(0, age);
}

function getAgeAtDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  let age = d.getFullYear() - BIRTHDAY.getFullYear();
  const m = d.getMonth() - BIRTHDAY.getMonth();
  if (m < 0 || (m === 0 && d.getDate() < BIRTHDAY.getDate())) age--;
  return Math.max(0, age);
}

// ===== Render Progress =====
function updateProgress() {
  const visited = Object.values(records).filter(r => r.visited).length;
  const remain = 47 - visited;
  const pct = Math.round((visited / 47) * 100);

  document.getElementById('visitedCount').innerHTML = `${visited}<span> / 47</span>`;
  document.getElementById('progressBar').style.width = `${pct}%`;

  const age = getAge();
  document.getElementById('ageDisplay').textContent = `いま ${age}さい`;

  if (visited === 47) {
    document.getElementById('remainInfo').textContent = '🎉 ぜんぶ制覇！すごい！';
  } else if (visited === 0) {
    document.getElementById('remainInfo').textContent = 'あと47県！がんばろう！';
  } else {
    document.getElementById('remainInfo').textContent = `あと${remain}県！${pct}%たっせい！`;
  }
}

// ===== Render Map =====
function renderMap() {
  const grid = document.getElementById('mapGrid');
  grid.innerHTML = '';
  const planned = getPlannedPrefs();

  const allPrefs = REGIONS.flatMap(r => r.prefs);

  allPrefs.forEach(name => {
    const pos = GRID_POS[name];
    if (!pos) return;

    const isVisited = records[name]?.visited;
    const isPlanned = !isVisited && planned.has(name);

    const cell = document.createElement('div');
    cell.className = 'pref-cell' + (isVisited ? ' visited' : '') + (isPlanned ? ' planned' : '');
    cell.textContent = name === '北海道' ? '北海道' : name === '東京' ? '東京' : name === '京都' ? '京都' : name.replace(/[県府]$/,'');

    cell.style.gridColumn = pos[1] + 1;
    cell.onclick = () => openModal(name);

  });

// ===== Modal =====
function findRegion(prefName) {
  for (const r of REGIONS) {
    if (r.prefs.includes(prefName)) return r.name;
  }
  return '';
}

function openModal(prefName) {
  currentPref = prefName;
  const rec = records[prefName] || {};
  tempPhotos = rec.photos ? [...rec.photos] : [];

  document.getElementById('modalTitle').textContent = prefName;
  document.getElementById('modalRegion').textContent = findRegion(prefName);

  const visited = rec.visited;
  const statusEl = document.getElementById('modalStatus');
  if (visited) {
    const ageAt = getAgeAtDate(rec.date);
    const ageText = ageAt !== null ? `（${ageAt}さいのとき）` : '';
    statusEl.className = 'modal-status visited-status';
    statusEl.innerHTML = `✅ 訪問ずみ！${ageText}`;
  } else {
    statusEl.className = 'modal-status unvisited-status';
    statusEl.innerHTML = '🗺️ まだ行ってないよ';
  }

  document.getElementById('inputDate').value = rec.date || '';
  document.getElementById('inputHotel').value = rec.hotel || '';
  document.getElementById('inputMemo').value = rec.memo || '';
  renderPhotoPreview();

  const btnRow = document.getElementById('btnRow');
  if (visited) {
    btnRow.innerHTML = `
      <button class="btn btn-primary" onclick="savePref()">保存する</button>
      <button class="btn btn-danger" onclick="unvisitPref()">取り消し</button>
    `;
  } else {
    btnRow.innerHTML = `
      <button class="btn btn-visited" onclick="markVisited()">泊まったよ！</button>
      <button class="btn btn-secondary" onclick="savePref()">メモだけ保存</button>
    `;
  }

  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
  currentPref = null;
  tempPhotos = [];
}

function getFormData() {
  return {
    date: document.getElementById('inputDate').value,
    hotel: document.getElementById('inputHotel').value,
    memo: document.getElementById('inputMemo').value,
    photos: [...tempPhotos],
  };
}

function markVisited() {
  if (!currentPref) return;
  const data = getFormData();
  const wasVisited = records[currentPref]?.visited;
  records[currentPref] = { ...data, visited: true };
  saveData();
  updateAll();
  closeModal();
  if (!wasVisited) showConfetti();
}

function savePref() {
  if (!currentPref) return;
  const data = getFormData();
  const existing = records[currentPref] || {};
  records[currentPref] = { ...existing, ...data };
  saveData();
  updateAll();
  closeModal();
}

function unvisitPref() {
  if (!currentPref) return;
  if (confirm(`${currentPref}の訪問記録を取り消しますか？`)) {
    records[currentPref] = { ...records[currentPref], visited: false };
    saveData();
    updateAll();
    closeModal();
  }
}

// ===== Photos =====
function handlePhotos(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      // Resize image to save localStorage space
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 400;
        let w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
        else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        tempPhotos.push(canvas.toDataURL('image/jpeg', 0.7));
        renderPhotoPreview();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderPhotoPreview() {
  const container = document.getElementById('photoPreview');
  container.innerHTML = tempPhotos.map((src, i) => `
    <div class="photo-thumb-wrap">
      <img src="${src}" class="photo-thumb">
      <button class="remove-photo" onclick="removePhoto(${i})">×</button>
    </div>
  `).join('');
}

function removePhoto(index) {
  tempPhotos.splice(index, 1);
  renderPhotoPreview();
}

let tripPlans = {}; // { "2027": [ {pref:"",month:"",spots:["","",""]}, ... ] }

const DEFAULT_MONTHS = ['5', '6', '11', '1', '2'];

function loadTripPlans() {
  try {
    const saved = localStorage.getItem('keisuke47_tripplans');
    if (saved) {
      tripPlans = JSON.parse(saved);
      // 月が全部空の年にデフォルト月を適用
      Object.keys(tripPlans).forEach(year => {
        const trips = tripPlans[year];
        const allMonthsEmpty = trips.every(t => !t.month);
        if (allMonthsEmpty) {
          trips.forEach((t, i) => { t.month = DEFAULT_MONTHS[i] || ''; });
        }
      });
      saveTripPlans();
    }
  } catch(e) {}
}

function saveTripPlans() {
  localStorage.setItem('keisuke47_tripplans', JSON.stringify(tripPlans));
}

const ALL_PREFS = [
  '北海道','青森','岩手','宮城','秋田','山形','福島',
  '茨城','栃木','群馬','埼玉','千葉','東京','神奈川',
  '新潟','富山','石川','福井','山梨','長野','岐阜','静岡','愛知',
  '三重','滋賀','京都','大阪','兵庫','奈良','和歌山',
  '鳥取','島根','岡山','広島','山口',
  '徳島','香川','愛媛','高知',
  '福岡','佐賀','長崎','熊本','大分','宮崎','鹿児島','沖縄'
];

function ensureYearPlans(year) {
  if (!tripPlans[year]) {
    tripPlans[year] = [
      { pref: '', month: '5', spots: ['', '', ''] },
      { pref: '', month: '6', spots: ['', '', ''] },
      { pref: '', month: '11', spots: ['', '', ''] },
      { pref: '', month: '1', spots: ['', '', ''] },
      { pref: '', month: '2', spots: ['', '', ''] },
    ];
  }
  // Ensure 5 trips
  while (tripPlans[year].length < 5) {
    tripPlans[year].push({ pref: '', month: '', spots: ['', '', ''] });
  }
  // Ensure each trip has 3 spots
  tripPlans[year].forEach(t => {
    if (!t.spots) t.spots = ['', '', ''];
    while (t.spots.length < 3) t.spots.push('');
  });
}

function renderPlanView() {
  const container = document.getElementById('planYearCards');
  const currentYear = new Date().getFullYear();
  let html = '';

  for (let year = 2026; year <= 2036; year++) {
    ensureYearPlans(year);
    const age = year - 2024;
    const isCurrent = year === currentYear;

    // Count filled trips
    const filledCount = tripPlans[year].filter(t => t.pref).length;

    html += `
      <div class="plan-year-card">
        <div class="plan-year-header" onclick="togglePlanYear(${year})">
          <div class="plan-year-left">
            <span class="plan-year-badge ${isCurrent ? 'current' : ''}">${year}年</span>

          ${tripPlans[year].map((trip, idx) => renderTripForm(year, idx, trip)).join('')}

  if (curArrow) { curArrow.classList.add('open'); }
}

function renderTripForm(year, idx, trip) {
  const isFilled = trip.pref ? 'plan-trip-filled' : '';
  const tripNum = idx + 1;
  const emoji = ['🚗', '✈️', '🚄', '🚢', '🏕'][idx];

  const prefOptions = `<option value="">都道府県</option>` +
    ALL_PREFS.map(p => `<option value="${p}" ${trip.pref === p ? 'selected' : ''}>${p}</option>`).join('');

  const monthOptions = `<option value="">月</option>` +
    Array.from({length:12}, (_,i) => i+1).map(m =>
      `<option value="${m}" ${trip.month == m ? 'selected' : ''}>${m}月</option>`
    ).join('');

  // Check for linked shiori
  const linkedShiori = trip.shioriId ? shioriData.find(s => s.id === trip.shioriId) : null;
  const shioriBtn = linkedShiori
    ? `<button class="plan-shiori-btn linked" onclick="event.stopPropagation();openShioriFromPlan('${trip.shioriId}')">📖 しおりを見る</button>`
    : trip.pref
      ? `<button class="plan-shiori-btn" onclick="event.stopPropagation();createShioriFromPlan(${year},${idx})">📖 しおりを作る</button>`
      : '';

  return `
    <div class="plan-trip ${isFilled}">
      <div class="plan-trip-header">${emoji} たび ${tripNum}</div>
      <div class="plan-trip-row">
        <select onchange="updateTripPlan(${year},${idx},'pref',this.value)">
          ${prefOptions}
        </select>
        <select onchange="updateTripPlan(${year},${idx},'month',this.value)">
          ${monthOptions}
        </select>
      </div>
      <div class="plan-spots">
        <input class="plan-spot-input" type="text" placeholder="📍 スポット1"
          value="${trip.spots[0] || ''}"
          onchange="updateTripSpot(${year},${idx},0,this.value)">
        <input class="plan-spot-input" type="text" placeholder="📍 スポット2"
          value="${trip.spots[1] || ''}"
          onchange="updateTripSpot(${year},${idx},1,this.value)">
        <input class="plan-spot-input" type="text" placeholder="📍 スポット3"
          value="${trip.spots[2] || ''}"
          onchange="updateTripSpot(${year},${idx},2,this.value)">
      </div>
      ${shioriBtn}
      ${linkedShiori ? `<div class="plan-shiori-link-info">📖 ${linkedShiori.title}</div>` : ''}
    </div>
  `;
}

function togglePlanYear(year) {
  const body = document.getElementById(`plan-body-${year}`);

  if (arrow) arrow.classList.toggle('open');

function updateTripPlan(year, idx, field, value) {
  ensureYearPlans(year);
  tripPlans[year][idx][field] = value;
  saveTripPlans();
  // Update the filled indicator
  const cards = document.querySelectorAll(`#plan-body-${year} .plan-trip`);
  if (cards[idx]) {
    cards[idx].classList.toggle('plan-trip-filled', !!tripPlans[year][idx].pref);
  }
  // Update count badge
  updatePlanCountBadge(year);
  // Update map/list colors
  if (field === 'pref') { renderMap(); renderList(); }
}

function updateTripSpot(year, idx, spotIdx, value) {
  ensureYearPlans(year);
  tripPlans[year][idx].spots[spotIdx] = value;
  saveTripPlans();
}

function updatePlanCountBadge(year) {
  const filledCount = tripPlans[year].filter(t => t.pref).length;
  const header = document.querySelector(`#plan-body-${year}`)?.previousElementSibling;
  if (header) {
    const badge = header.querySelector('.plan-count-badge');
    if (badge) {
      badge.textContent = filledCount > 0 ? filledCount + '件' : '未定';
      badge.classList.toggle('empty', filledCount === 0);
    }
  }
}

  navigator.clipboard.writeText(prompt).then(() => {
    const btn = event.target;
    const original = btn.textContent;
    btn.textContent = '✅ コピーした！';
    setTimeout(() => { btn.textContent = original; }, 1500);
  });
}

function importClaudeInfo() {
  if (!currentPref) return;
  const text = document.getElementById('claudeImportText').value.trim();
  if (!text) return;

  // Parse the Claude response into sections
  const info = parseClaudeResponse(text);

  // Save to records
  if (!records[currentPref]) records[currentPref] = {};
  records[currentPref].claudeInfo = info;
  records[currentPref].claudeRaw = text;
  saveData();

  // Show success
  const el = document.getElementById('importSuccess');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);

  // Re-render saved info
  renderClaudeSavedInfo();
  document.getElementById('claudeImportText').value = '';
}

function parseClaudeResponse(text) {
  const sections = {};
  const patterns = [
    { key: 'spots', label: 'おすすめスポット', regex: /【おすすめスポット】([\s\S]*?)(?=【|$)/ },
    { key: 'hotels', label: 'おすすめ宿泊先', regex: /【おすすめ宿泊先】([\s\S]*?)(?=【|$)/ },
    { key: 'season', label: 'おすすめ時期', regex: /【おすすめ時期】([\s\S]*?)(?=【|$)/ },
    { key: 'plan', label: 'モデルプラン', regex: /【モデルプラン】([\s\S]*?)(?=【|$)/ },
    { key: 'budget', label: '予算めやす', regex: /【予算めやす】([\s\S]*?)(?=【|$)/ },
    { key: 'media', label: 'ブログ・YouTube映えポイント', regex: /【ブログ.*?ポイント】([\s\S]*?)(?=【|$)/ },
  ];

  patterns.forEach(p => {
    const match = text.match(p.regex);
    if (match) {
      sections[p.key] = match[1].trim();
    }
  });

  // If no sections matched, save entire text as general info
  if (Object.keys(sections).length === 0) {
    sections.general = text;
  }

  return sections;
}

function renderClaudeSavedInfo() {
  const container = document.getElementById('claudeSavedInfo');
  if (!currentPref || !records[currentPref]?.claudeInfo) {
    container.innerHTML = '<p style="font-size:12px;color:var(--text-light);margin-bottom:10px">まだ情報がないよ。「質問をコピー」してクロちゃんに聞いてみよう！</p>';
    return;
  }

  const info = records[currentPref].claudeInfo;
  const icons = {
    spots: '📍',
    hotels: '🏨',
    season: '🌸',
    plan: '🗓',
    budget: '💰',
    media: '📸',
    general: '📝',
  };
  const labels = {
    spots: 'おすすめスポット',
    hotels: 'おすすめ宿泊先',
    season: 'おすすめ時期',
    plan: 'モデルプラン',
    budget: '予算めやす',
    media: '映えポイント',
    general: 'クロちゃん情報',
  };

  let html = '';
  for (const [key, value] of Object.entries(info)) {
    const lines = value.split('\n').filter(l => l.trim());
    const isList = lines.every(l => l.trim().startsWith('-') || l.trim().match(/^\d/));

    html += `<div class="claude-info-card">
      <h4>${icons[key] || '📝'} ${labels[key] || key}</h4>
      ${isList
        ? `<ul>${lines.map(l => `<li>${l.replace(/^[-・]\s*/, '').replace(/^\d+[.、．]\s*/, '')}</li>`).join('')}</ul>`
        : `<p>${lines.join('<br>')}</p>`
      }
    </div>`;
  }

  container.innerHTML = html;
}

function clearClaudeInfo() {
  if (!currentPref) return;
  if (!records[currentPref]?.claudeInfo) return;
  if (confirm('クロちゃん情報をクリアしますか？')) {
    delete records[currentPref].claudeInfo;
    delete records[currentPref].claudeRaw;
    saveData();
    renderClaudeSavedInfo();
  }
}

let shioriData = []; // [ { id, title, pref, startDate, endDate, days: [ { date, items: [ { time, place, url, memo } ] } ] } ]

function loadShiori() {
  try {
    const saved = localStorage.getItem('keisuke47_shiori');
    if (saved) shioriData = JSON.parse(saved);
  } catch(e) {}
}

function saveShiori() {
  localStorage.setItem('keisuke47_shiori', JSON.stringify(shioriData));
}

function openShioriModal() {
  // Populate prefecture select
  const sel = document.getElementById('shioriPref');
  sel.innerHTML = '<option value="">選んでね</option>' +
    ALL_PREFS.map(p => `<option value="${p}">${p}</option>`).join('');
  document.getElementById('shioriTitle').value = '';
  document.getElementById('shioriStartDate').value = '';
  document.getElementById('shioriEndDate').value = '';

function closeShioriModal() {

function createShiori() {
  const title = document.getElementById('shioriTitle').value.trim();
  const pref = document.getElementById('shioriPref').value;
  const startDate = document.getElementById('shioriStartDate').value;
  const endDate = document.getElementById('shioriEndDate').value;

  if (!title) { alert('タイトルを入れてね！'); return; }

  // Calculate days between dates
  let days = [];
  if (startDate && endDate) {
    const start = new Date(startDate);
    const end = new Date(endDate);
    const diff = Math.max(1, Math.round((end - start) / 86400000) + 1);
    for (let i = 0; i < diff; i++) {
      const d = new Date(start);
      d.setDate(d.getDate() + i);
      const dateStr = d.toISOString().split('T')[0];
      days.push({ date: dateStr, items: [{ time: '', place: '', url: '', memo: '' }] });
    }
  } else {
    days = [{ date: '', items: [{ time: '', place: '', url: '', memo: '' }] }];
  }

  const shiori = {
    id: Date.now().toString(),
    title,
    pref,
    startDate,
    endDate,
    days
  };

  shioriData.unshift(shiori);
  saveShiori();
  closeShioriModal();
  openShioriDetail(shiori.id);
}

function deleteShiori(id) {
  if (!confirm('このしおりを削除しますか？')) return;
  // Unlink from plan
  Object.values(tripPlans).forEach(trips => {
    trips.forEach(t => { if (t.shioriId === id) delete t.shioriId; });
  });
  saveTripPlans();
  shioriData = shioriData.filter(s => s.id !== id);
  saveShiori();
  document.getElementById('shioriDetail').classList.remove('active');
  document.getElementById('view-shiori').classList.add('active');
  renderShioriList();
}

function renderShioriList() {
  const container = document.getElementById('shioriList');
  if (shioriData.length === 0) {
    container.innerHTML = '<div class="shiori-empty">📖 まだしおりがないよ<br>「しおりを作る」から始めよう！</div>';
    return;
  }

  container.innerHTML = shioriData.map(s => {
    const dateText = s.startDate && s.endDate
      ? `${formatShioriDate(s.startDate)} 〜 ${formatShioriDate(s.endDate)}`
      : '日程未定';
    const dayCount = s.days.length;
    const itemCount = s.days.reduce((sum, d) => sum + d.items.filter(it => it.place).length, 0);
    const planTag = s.linkedPlan ? `<span style="background:var(--pink-light);color:var(--pink);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;margin-left:6px">📅 けいかくリンク</span>` : '';
    return `<div class="shiori-card" onclick="openShioriDetail('${s.id}')">
      <div class="shiori-card-title">${s.pref ? s.pref + '：' : ''}${s.title}${planTag}</div>
      <div class="shiori-card-date">${dateText}</div>
      <div class="shiori-card-days">${dayCount}日間 ・ ${itemCount}件のスケジュール</div>
    </div>`;
  }).join('');
}

function formatShioriDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function formatShioriDateFull(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getMonth() + 1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

function openShioriDetail(id) {
  const shiori = shioriData.find(s => s.id === id);
  if (!shiori) return;

  document.getElementById('view-shiori').classList.remove('active');
  const detail = document.getElementById('shioriDetail');
  detail.classList.add('active');

  renderShioriDetail(shiori);
  window.scrollTo({ top: 0 });
}

function renderShioriDetail(shiori) {

  const planLink = planInfo
    ? `<div style="font-size:11px;margin-top:6px;opacity:0.85">📅 ${planInfo.year}年 たび${planInfo.idx + 1} とリンク中</div>`
    : '';

    ? `<button onclick="unlinkShioriFromPlan('${shiori.id}')">🔓 リンク解除</button>`
    : `<button onclick="openLinkPlanModal('${shiori.id}')">📅 けいかくと紐付け</button>`;

  let html = `
    <div class="shiori-detail-header">
      <button class="shiori-back-btn" onclick="backToShioriList()">← もどる</button>
      <div class="shiori-detail-title">${shiori.pref ? shiori.pref + '：' : ''}${shiori.title}</div>
      <div class="shiori-detail-date">${dateText}</div>
      ${planLink}
      <div class="shiori-detail-actions">
        ${linkBtn}
        <button onclick="editShioriMeta('${shiori.id}')">✏️ 編集</button>
        <button onclick="deleteShiori('${shiori.id}')">🗑 削除</button>
      </div>
    </div>
  `;

  shiori.days.forEach((day, dayIdx) => {
    const dayLabel = `${dayIdx + 1}日目`;
    const dateLabel = day.date ? formatShioriDateFull(day.date) : '';
    html += `
      <div class="shiori-day">
        <div class="shiori-day-header">
          <span>🌟 ${dayLabel}${dateLabel ? '　' + dateLabel : ''}</span>
          ${shiori.days.length > 1 ? `<button class="shiori-remove-day-btn" onclick="removeShioriDay('${shiori.id}',${dayIdx})">✕</button>` : ''}
        </div>
    `;

    day.items.forEach((item, itemIdx) => {
      const isFirst = itemIdx === 0;
      const isLast = itemIdx === day.items.length - 1;
      html += `
        <div class="shiori-item">
          <div class="shiori-item-row" style="justify-content:space-between">
            <span style="font-size:11px;color:var(--text-light);font-weight:700">No.${itemIdx + 1}</span>
            <div style="display:flex;gap:4px">
              <button class="shiori-item-delete" ${isFirst ? 'disabled style="opacity:0.2"' : ''} onclick="moveShioriItem('${shiori.id}',${dayIdx},${itemIdx},-1)">⬆</button>
              <button class="shiori-item-delete" ${isLast ? 'disabled style="opacity:0.2"' : ''} onclick="moveShioriItem('${shiori.id}',${dayIdx},${itemIdx},1)">⬇</button>
              <button class="shiori-item-delete" onclick="removeShioriItem('${shiori.id}',${dayIdx},${itemIdx})">🗑</button>
            </div>
          </div>
          <div class="shiori-item-row">
            <span class="shiori-item-icon">⏰</span>
            <input type="time" class="shiori-item-input time-input" value="${item.time}"
              onchange="updateShioriItem('${shiori.id}',${dayIdx},${itemIdx},'time',this.value)">
            <span class="shiori-item-icon">📍</span>
            <input type="text" class="shiori-item-input" placeholder="場所" value="${escapeHtml(item.place)}"
              onchange="updateShioriItem('${shiori.id}',${dayIdx},${itemIdx},'place',this.value)">
          </div>
          <div class="shiori-item-row">
            <span class="shiori-item-icon">🔗</span>
            <input type="url" class="shiori-item-input" placeholder="URL（予約サイトなど）" value="${escapeHtml(item.url)}"
              onchange="updateShioriItem('${shiori.id}',${dayIdx},${itemIdx},'url',this.value)">
          </div>
          ${item.url ? `<div class="shiori-item-row"><span class="shiori-item-icon"></span><a href="${escapeHtml(item.url)}" target="_blank" class="shiori-item-url">${escapeHtml(item.url)}</a></div>` : ''}
          <div class="shiori-item-row">
            <span class="shiori-item-icon">📝</span>
            <input type="text" class="shiori-item-input" placeholder="メモ" value="${escapeHtml(item.memo)}"
              onchange="updateShioriItem('${shiori.id}',${dayIdx},${itemIdx},'memo',this.value)">
          </div>
          <div class="shiori-item-photos">
            ${(item.photos || []).map((src, pi) => `
              <div class="shiori-item-photo-wrap">
                <img src="${src}" onclick="openPhotoFullscreen('${src.replace(/'/g, "\\'")}')">
                <button class="shiori-item-photo-remove" onclick="removeShioriItemPhoto('${shiori.id}',${dayIdx},${itemIdx},${pi})">×</button>
              </div>
            `).join('')}
            <button class="shiori-item-photo-add" onclick="document.getElementById('shioriPhotoInput-${dayIdx}-${itemIdx}').click()">＋</button>
            <input type="file" id="shioriPhotoInput-${dayIdx}-${itemIdx}" accept="image/*" multiple style="display:none"
              onchange="addShioriItemPhotos('${shiori.id}',${dayIdx},${itemIdx},event)">
          </div>
        </div>
      `;
    });

    html += `
        <button class="shiori-add-item-btn" onclick="addShioriItem('${shiori.id}',${dayIdx})">＋ スケジュールを追加</button>
      </div>
    `;
  });

  html += `<button class="shiori-add-day-btn" onclick="addShioriDay('${shiori.id}')">＋ 日を追加</button>`;
  html += `<button class="shiori-blog-btn" onclick="openBlogModal('${shiori.id}')">📝 ブログ記事として書き出し</button>`;

  if (shiori.importedMemo) {
    html += `<div style="margin:0 16px 24px;background:var(--card);border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06)">
      <div style="font-weight:900;font-size:14px;margin-bottom:8px">📝 メモ</div>
      <div style="font-size:13px;line-height:1.6;white-space:pre-wrap;color:var(--text-light)">${escapeHtml(shiori.importedMemo)}</div>

  }

  detail.innerHTML = html;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function backToShioriList() {
  document.getElementById('shioriDetail').classList.remove('active');
  document.getElementById('view-shiori').classList.add('active');
  renderShioriList();
}

function updateShioriItem(id, dayIdx, itemIdx, field, value) {
  const shiori = shioriData.find(s => s.id === id);
  if (!shiori) return;
  shiori.days[dayIdx].items[itemIdx][field] = value;
  saveShiori();
  // Re-render if URL changed (to show/hide link)
  if (field === 'url') renderShioriDetail(shiori);
}

function addShioriItem(id, dayIdx) {
  const shiori = shioriData.find(s => s.id === id);
  if (!shiori) return;
  shiori.days[dayIdx].items.push({ time: '', place: '', url: '', memo: '' });
  saveShiori();
  renderShioriDetail(shiori);
}

function removeShioriItem(id, dayIdx, itemIdx) {
  const shiori = shioriData.find(s => s.id === id);
  if (!shiori) return;
  if (shiori.days[dayIdx].items.length <= 1) {
    // Keep at least one empty placeholder
    shiori.days[dayIdx].items = [{ time: '', place: '', url: '', memo: '' }];
  } else {
    shiori.days[dayIdx].items.splice(itemIdx, 1);
  }
  saveShiori();
  renderShioriDetail(shiori);
}

function addShioriItemPhotos(id, dayIdx, itemIdx, e) {
  const shiori = shioriData.find(s => s.id === id);
  if (!shiori) return;
  const item = shiori.days[dayIdx].items[itemIdx];
  if (!item.photos) item.photos = [];

  const files = Array.from(e.target.files);
  let pending = files.length;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
        else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        item.photos.push(canvas.toDataURL('image/jpeg', 0.75));
        pending--;
        if (pending === 0) {
          try {
            saveShiori();
            renderShioriDetail(shiori);
          } catch(err) {
            alert('写真の保存に失敗💦 容量オーバーかも');
            console.error(err);
          }
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function removeShioriItemPhoto(id, dayIdx, itemIdx, photoIdx) {
  const shiori = shioriData.find(s => s.id === id);
  if (!shiori) return;
  const item = shiori.days[dayIdx].items[itemIdx];
  if (!item.photos) return;
  item.photos.splice(photoIdx, 1);
  saveShiori();
  renderShioriDetail(shiori);
}

function openPhotoFullscreen(src) {
  document.getElementById('photoFullscreenImg').src = src;
  document.getElementById('photoFullscreen').style.display = 'flex';
}

// ===== Blog Export =====
let _blogShioriId = null;
let _blogFormat = 'preview';

function openBlogModal(id) {
  _blogShioriId = id;
  _blogFormat = 'preview';
  document.getElementById('blogOverlay').classList.add('show');
  switchBlogFormat('preview');
}

function closeBlogModal() {
  document.getElementById('blogOverlay').classList.remove('show');
  _blogShioriId = null;
}

function switchBlogFormat(fmt) {
  _blogFormat = fmt;
  document.getElementById('blogTabPreview').classList.toggle('active', fmt === 'preview');
  document.getElementById('blogTabMd').classList.toggle('active', fmt === 'md');
  document.getElementById('blogTabHtml').classList.toggle('active', fmt === 'html');

  const shiori = shioriData.find(s => s.id === _blogShioriId);
  if (!shiori) return;

  const previewArea = document.getElementById('blogPreviewArea');
  const textArea = document.getElementById('blogTextArea');

  if (fmt === 'preview') {
    previewArea.style.display = 'block';
    textArea.style.display = 'none';
    previewArea.innerHTML = generateBlogHtml(shiori);
  } else if (fmt === 'md') {
    previewArea.style.display = 'none';
    textArea.style.display = 'block';
    textArea.value = generateBlogMarkdown(shiori);
  } else {
    previewArea.style.display = 'none';
    textArea.style.display = 'block';
    textArea.value = generateBlogHtml(shiori);
  }
}

function copyBlogContent() {
  const shiori = shioriData.find(s => s.id === _blogShioriId);
  if (!shiori) return;
  const content = _blogFormat === 'md'
    ? generateBlogMarkdown(shiori)
    : generateBlogHtml(shiori);
  navigator.clipboard.writeText(content).then(() => {
    alert('コピーした！📋');
  }).catch(() => {
    alert('コピー失敗💦 テキストを長押しでコピーしてね');
  });
}

function generateBlogHtml(shiori) {
  const dateText = shiori.startDate && shiori.endDate
    ? `${formatShioriDateFull(shiori.startDate)} 〜 ${formatShioriDateFull(shiori.endDate)}`
    : '';
  let html = `<h1>${escapeHtml(shiori.title)}</h1>`;
  if (shiori.pref) html += `<p>📍 ${escapeHtml(shiori.pref)}</p>`;
  if (dateText) html += `<p>📅 ${dateText}</p>`;

  shiori.days.forEach((day, dayIdx) => {
    const dateLabel = day.date ? formatShioriDateFull(day.date) : '';
    html += `<h2>🌟 ${dayIdx + 1}日目${dateLabel ? '：' + dateLabel : ''}</h2>`;

    day.items.forEach(item => {
      if (!item.time && !item.place && !item.memo && (!item.photos || !item.photos.length)) return;
      html += `<h3>${item.time ? '⏰ ' + item.time + '　' : ''}${escapeHtml(item.place || '')}</h3>`;
      if (item.memo) html += `<p>${escapeHtml(item.memo)}</p>`;
      if (item.url) html += `<p><a href="${escapeHtml(item.url)}" target="_blank">${escapeHtml(item.url)}</a></p>`;
      if (item.photos && item.photos.length) {
        item.photos.forEach(src => {
          html += `<img src="${src}" alt="">`;
        });
      }
    });
  });

  if (shiori.importedMemo) {
    html += `<h2>📝 メモ</h2><p>${escapeHtml(shiori.importedMemo).replace(/\n/g,'<br>')}</p>`;
  }

  return html;
}

function generateBlogMarkdown(shiori) {
  const dateText = shiori.startDate && shiori.endDate
    ? `${formatShioriDateFull(shiori.startDate)} 〜 ${formatShioriDateFull(shiori.endDate)}`
    : '';
  let md = `# ${shiori.title}\n\n`;
  if (shiori.pref) md += `📍 ${shiori.pref}\n\n`;
  if (dateText) md += `📅 ${dateText}\n\n`;

  shiori.days.forEach((day, dayIdx) => {
    const dateLabel = day.date ? formatShioriDateFull(day.date) : '';
    md += `## 🌟 ${dayIdx + 1}日目${dateLabel ? '：' + dateLabel : ''}\n\n`;

    day.items.forEach(item => {
      if (!item.time && !item.place && !item.memo && (!item.photos || !item.photos.length)) return;
      md += `### ${item.time ? '⏰ ' + item.time + '　' : ''}${item.place || ''}\n\n`;
      if (item.memo) md += `${item.memo}\n\n`;
      if (item.url) md += `[${item.url}](${item.url})\n\n`;
      if (item.photos && item.photos.length) {
        item.photos.forEach((src, i) => {
          md += `![photo${i+1}](${src})\n\n`;
        });
      }
    });
  });

  if (shiori.importedMemo) {
    md += `## 📝 メモ\n\n${shiori.importedMemo}\n\n`;
  }

  return md;
}

function moveShioriItem(id, dayIdx, itemIdx, direction) {
  const shiori = shioriData.find(s => s.id === id);
  if (!shiori) return;
  const items = shiori.days[dayIdx].items;
  const newIdx = itemIdx + direction;
  if (newIdx < 0 || newIdx >= items.length) return;
  [items[itemIdx], items[newIdx]] = [items[newIdx], items[itemIdx]];
  saveShiori();
  renderShioriDetail(shiori);
}

function addShioriDay(id) {
  const shiori = shioriData.find(s => s.id === id);
  if (!shiori) return;
  // Calculate next date
  const lastDay = shiori.days[shiori.days.length - 1];
  let newDate = '';
  if (lastDay.date) {
    const d = new Date(lastDay.date);
    d.setDate(d.getDate() + 1);
    newDate = d.toISOString().split('T')[0];
  }
  shiori.days.push({ date: newDate, items: [{ time: '', place: '', url: '', memo: '' }] });
  saveShiori();
  renderShioriDetail(shiori);
}

function removeShioriDay(id, dayIdx) {
  const shiori = shioriData.find(s => s.id === id);
  if (!shiori || shiori.days.length <= 1) return;
  if (!confirm(`${dayIdx + 1}日目を削除しますか？`)) return;
  shiori.days.splice(dayIdx, 1);
  saveShiori();
  renderShioriDetail(shiori);
}

function editShioriMeta(id) {
  const shiori = shioriData.find(s => s.id === id);
  if (!shiori) return;
  const newTitle = prompt('タイトル', shiori.title);
  if (newTitle !== null && newTitle.trim()) {
    shiori.title = newTitle.trim();
    saveShiori();
    renderShioriDetail(shiori);
  }
}

// ===== Shiori Import from Text =====
function openShioriImportModal() {
  document.getElementById('shioriImportText').value = '';
  document.getElementById('shioriImportOverlay').classList.add('show');
}

function closeShioriImportModal() {
  document.getElementById('shioriImportOverlay').classList.remove('show');
}

function importShioriFromText() {
  const text = document.getElementById('shioriImportText').value.trim();
  if (!text) { alert('テキストを貼り付けてね！'); return; }

  const parsed = parseShioriText(text);
  if (!parsed.days.length) {
    alert('日付付きのスケジュールが見つからへんかった💦\n「📅 ◯月◯日」の形式で書いてね！');
    return;
  }

  const shiori = {
    id: Date.now().toString(),
    title: parsed.title || '取り込んだ旅',
    pref: parsed.pref || '',
    startDate: parsed.startDate || (parsed.days[0]?.date) || '',
    endDate: parsed.endDate || (parsed.days[parsed.days.length-1]?.date) || '',
    days: parsed.days,
    importedMemo: parsed.memo || ''
  };

  shioriData.unshift(shiori);
  saveShiori();
  closeShioriImportModal();
  openShioriDetail(shiori.id);
}

function parseShioriText(text) {
  const result = { title: '', pref: '', startDate: '', endDate: '', days: [], memo: '' };
  const lines = text.split('\n');

  // Try to find prefecture mentioned
  for (const p of ALL_PREFS) {
    if (text.includes(p)) { result.pref = p; break; }
  }

  // Extract date range from "日程：YYYY年M月D日(...)〜D日(...)" or similar
  const rangeMatch = text.match(/(\d{4})年(\d{1,2})月(\d{1,2})日[^〜~\-]*[〜~\-]+(?:(\d{4})年)?(?:(\d{1,2})月)?(\d{1,2})日/);
  if (rangeMatch) {
    const [, y1, m1, d1, y2, m2, d2] = rangeMatch;
    const yy1 = parseInt(y1);
    const mm1 = parseInt(m1);
    const dd1 = parseInt(d1);
    const yy2 = parseInt(y2 || y1);
    const mm2 = parseInt(m2 || m1);
    const dd2 = parseInt(d2);
    result.startDate = `${yy1}-${String(mm1).padStart(2,'0')}-${String(dd1).padStart(2,'0')}`;
    result.endDate = `${yy2}-${String(mm2).padStart(2,'0')}-${String(dd2).padStart(2,'0')}`;
  }

  // Title: try to find "目的：..." or use first heading
  const purposeMatch = text.match(/目的[：:]\s*(.+)/);
  if (purposeMatch) {
    result.title = purposeMatch[1].trim().slice(0, 30);
  }
  if (!result.title && result.pref) {
    result.title = result.pref + 'たび';
  }

  // Parse day sections marked with 📅
  const baseYear = result.startDate ? parseInt(result.startDate.slice(0,4)) : new Date().getFullYear();
  const sections = [];
  let current = null;
  let inMemo = false;
  const memoLines = [];

  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;

    // Day header: 📅 10日（土） or 📅 10月10日（土） etc.
    const dayMatch = line.match(/📅\s*(?:(\d{1,2})月)?(\d{1,2})日/);
    if (dayMatch) {
      inMemo = false;
      const month = dayMatch[1] ? parseInt(dayMatch[1]) : (result.startDate ? parseInt(result.startDate.slice(5,7)) : null);
      const day = parseInt(dayMatch[2]);
      let dateStr = '';
      if (month && day) {
        dateStr = `${baseYear}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      }
      current = { date: dateStr, items: [] };
      sections.push(current);
      continue;
    }

    // Memo section
    if (line.match(/^\*?\*?メモ\*?\*?$/) || line === 'メモ') {
      inMemo = true;
      current = null;
      continue;
    }

    if (inMemo) {
      memoLines.push(line.replace(/^[-・]\s*/, ''));
      continue;
    }

    // Schedule item under a day
    if (current) {
      // Strip leading bullet
      const cleaned = line.replace(/^[-・*]\s*/, '');
      if (!cleaned) continue;

      // Parse time: "11:30 ..." or "9:30〜11:30 ..." or "〜11:00 ..."
      const timeMatch = cleaned.match(/^(?:〜|~)?(\d{1,2}:\d{2})(?:\s*[〜~\-]\s*\d{1,2}:\d{2})?\s*(.*)$/);
      if (timeMatch) {
        const time = timeMatch[1];
        const rest = timeMatch[2].trim();
        // Pad time to HH:MM
        const [h, m] = time.split(':');
        const paddedTime = `${String(h).padStart(2,'0')}:${m}`;
        current.items.push({ time: paddedTime, place: rest, url: '', memo: '' });
      } else {
        // No time, treat as place
        current.items.push({ time: '', place: cleaned, url: '', memo: '' });
      }
    }
  }

  // Filter out empty days, ensure at least one item per day
  result.days = sections.filter(s => s.items.length > 0).map(s => ({
    date: s.date,
    items: s.items.length ? s.items : [{ time: '', place: '', url: '', memo: '' }]
  }));

  result.memo = memoLines.join('\n');

  return result;
}

// ===== Plan ↔ Shiori Link =====
function createShioriFromPlan(year, idx) {
  const trip = tripPlans[year]?.[idx];
  if (!trip || !trip.pref) return;

  const month = trip.month ? `${trip.month}月` : '';
  const title = `${trip.pref}たび ${year}年${month}`;

  // Pre-fill dates if month is set
  let startDate = '', endDate = '';
  if (trip.month) {
    const m = String(trip.month).padStart(2, '0');
    startDate = `${year}-${m}-01`;
    // Default 2 nights 3 days
    const sd = new Date(startDate);
    sd.setDate(sd.getDate() + 2);
    endDate = sd.toISOString().split('T')[0];
  }

  const days = [];
  if (startDate && endDate) {
    const start = new Date(startDate);
    const end = new Date(endDate);
    const diff = Math.max(1, Math.round((end - start) / 86400000) + 1);
    for (let i = 0; i < diff; i++) {
      const d = new Date(start);
      d.setDate(d.getDate() + i);
      days.push({ date: d.toISOString().split('T')[0], items: [{ time: '', place: '', url: '', memo: '' }] });
    }
  } else {
    days.push({ date: '', items: [{ time: '', place: '', url: '', memo: '' }] });
  }

  // Pre-fill spots as items on day 1
  const spots = (trip.spots || []).filter(s => s);
  spots.forEach((spot, i) => {
    if (i === 0 && days[0]) {
      days[0].items[0].place = spot;
    } else if (days[0]) {
      days[0].items.push({ time: '', place: spot, url: '', memo: '' });
    }
  });

  const shiori = {
    id: Date.now().toString(),
    title,
    pref: trip.pref,
    startDate,
    endDate,
    days,
    linkedPlan: { year, idx }
  };

  shioriData.unshift(shiori);
  saveShiori();

  // Link back from plan
  trip.shioriId = shiori.id;
  saveTripPlans();

  // Navigate to shiori detail
  switchNav('shiori');
  openShioriDetail(shiori.id);
}

function openShioriFromPlan(shioriId) {
  switchNav('shiori');
  openShioriDetail(shioriId);
}

// ===== Link existing shiori to plan =====
let _linkingShioriId = null;

function openLinkPlanModal(shioriId) {
  _linkingShioriId = shioriId;
  const shiori = shioriData.find(s => s.id === shioriId);
  // Default year from shiori's startDate
  const defaultYear = shiori?.startDate ? parseInt(shiori.startDate.slice(0,4)) : new Date().getFullYear();

  const yearSel = document.getElementById('linkPlanYear');
  yearSel.innerHTML = '';
  for (let y = 2026; y <= 2036; y++) {
    yearSel.innerHTML += `<option value="${y}" ${y === defaultYear ? 'selected' : ''}>${y}年（けいすけ${y - 2024}さい）</option>`;
  }
  renderLinkPlanTrips();
  document.getElementById('linkPlanOverlay').classList.add('show');
}

function renderLinkPlanTrips() {
  const year = parseInt(document.getElementById('linkPlanYear').value);
  ensureYearPlans(year);
  const trips = tripPlans[year];
  const tripSel = document.getElementById('linkPlanTrip');
  const emojis = ['🚗','✈️','🚄','🚢','🏕'];
  tripSel.innerHTML = trips.map((t, i) => {
    const label = `${emojis[i]} たび${i+1}` +
      (t.pref ? `：${t.pref}` : '') +
      (t.month ? `（${t.month}月）` : '') +
      (t.shioriId ? '【🔗紐付済】' : '');
    return `<option value="${i}">${label}</option>`;
  }).join('');
}

function closeLinkPlanModal() {
  document.getElementById('linkPlanOverlay').classList.remove('show');
  _linkingShioriId = null;
}

function confirmLinkPlan() {
  const shiori = shioriData.find(s => s.id === _linkingShioriId);
  if (!shiori) { closeLinkPlanModal(); return; }
  const year = parseInt(document.getElementById('linkPlanYear').value);
  const idx = parseInt(document.getElementById('linkPlanTrip').value);
  ensureYearPlans(year);
  const trip = tripPlans[year][idx];

  // If target trip already has a different shiori, confirm overwrite
  if (trip.shioriId && trip.shioriId !== shiori.id) {
    if (!confirm('このたびには別のしおりが紐付いてるで！上書きする？')) return;
    // Unlink old shiori from this plan
    const oldShiori = shioriData.find(s => s.id === trip.shioriId);
    if (oldShiori) delete oldShiori.linkedPlan;
  }

  // Remove this shiori's old plan link if any
  if (shiori.linkedPlan) {
    const oldTrip = tripPlans[shiori.linkedPlan.year]?.[shiori.linkedPlan.idx];
    if (oldTrip) delete oldTrip.shioriId;
  }

  // Set new link
  trip.shioriId = shiori.id;
  shiori.linkedPlan = { year, idx };
  // Auto-fill plan pref if empty
  if (!trip.pref && shiori.pref) trip.pref = shiori.pref;

  saveShiori();
  saveTripPlans();
  closeLinkPlanModal();
  renderShioriDetail(shiori);
}

function unlinkShioriFromPlan(shioriId) {
  const shiori = shioriData.find(s => s.id === shioriId);
  if (!shiori || !shiori.linkedPlan) return;
  if (!confirm('リンクを解除する？（しおりとけいかくは消えへんで）')) return;
  const trip = tripPlans[shiori.linkedPlan.year]?.[shiori.linkedPlan.idx];
  if (trip) delete trip.shioriId;
  delete shiori.linkedPlan;
  saveShiori();
  saveTripPlans();
  renderShioriDetail(shiori);
}

function getLinkedPlanInfo(shiori) {
  if (!shiori.linkedPlan) return null;
  const { year, idx } = shiori.linkedPlan;
  const trip = tripPlans[year]?.[idx];
  if (!trip) return null;
  return { year, idx, trip };
}

function updateAll() {
  updateProgress();
  renderMap();
  renderList();
}

// ===== Init =====
loadData();
loadTripPlans();
loadShiori();
updateAll();
